version: '3.9'
services:
  app:
    build:
      context: .
      dockerfile: docker/dockerfile
    volumes:
      - .:/var/www
    environment:
      - APP_ENV=${APP_ENV:-development}
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=${DB_NAME:-everypay}
      - DB_USER=${DB_USER:-everypay}
      - DB_PASS=${DB_PASS:-secret}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - everypay
  
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "8080:80"
    volumes:
      - ./var/www
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - everypay

  mysql:
    image: mariadb:11.2
    environment:
      MYSQL_ROOT_PASSWORD: rootsecret
      MYSQL_DATABASE: everypay
      MYSQL_USER: everypay
      MYSQL_PASSWORD: secret
    ports:
      - "3307:3306"
    volumes: 
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - everypay


  migrate:
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: bash /var/www/database/init.sh
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=everypay
      - DB_USER=everypay
      - DB_PASS=secret
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - everypay

volumes:
  mysql_data:

networks:
  everypay:
    driver: bridge    