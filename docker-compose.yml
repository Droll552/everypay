services:

  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    volumes:
      - db_data:/var/www/database
      - log_data:/var/log/app
    networks:
      - app_network
    restart: unless-stopped

  nginx:
    image: nginx:1.25-alpine
    ports:
      - "8080:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./public:/var/www/public:ro
    depends_on:
      - php
    networks:
      - app_network
    restart: unless-stopped

volumes:
  db_data:
  log_data:

networks:
  app_network:
    driver: bridge
